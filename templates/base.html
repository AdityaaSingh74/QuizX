<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizX - Modern Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: '#4f46e5',
                            foreground: '#ffffff',
                        },
                        background: '#FAFAFA',
                        foreground: '#0f172a',
                        card: '#ffffff',
                        muted: '#f1f5f9',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #FAFAFA;
            color: #0f172a;
            overflow-x: hidden;
            font-family: "Plus Jakarta Sans", sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 50px rgba(8, 112, 184, 0.07), 0 10px 20px rgba(0, 0, 0, 0.03);
            border-radius: 0.5rem;
        }

        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #FAFAFA;
        }
        
        .aurora-blur {
            position: absolute;
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.5;
        }

        .aurora-1 {
            background: rgba(79, 70, 229, 0.4);
            width: 50vw;
            height: 50vw;
            top: -20vh;
            left: -10vw;
            animation: aurora-1 15s ease-in-out infinite alternate;
        }

        .aurora-2 {
            background: rgba(147, 51, 234, 0.3);
            width: 60vw;
            height: 60vw;
            bottom: -20vh;
            right: -10vw;
            animation: aurora-2 20s ease-in-out infinite alternate;
        }
        
        .aurora-3 {
            background: rgba(59, 130, 246, 0.3);
            width: 45vw;
            height: 45vw;
            top: 20vh;
            left: 20vw;
            animation: aurora-3 25s ease-in-out infinite alternate;
        }

        @keyframes aurora-1 {
            0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
            50% { transform: translate(20vw, -10vh) scale(1.2); opacity: 0.8; }
            100% { transform: translate(-10vw, 20vh) scale(1); opacity: 0.6; }
        }

        @keyframes aurora-2 {
            0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            50% { transform: translate(-30vw, 15vh) scale(1.3); opacity: 0.7; }
            100% { transform: translate(15vw, -20vh) scale(1); opacity: 0.5; }
        }

        @keyframes aurora-3 {
            0% { transform: translate(0, 0) scale(1.1); opacity: 0.6; }
            50% { transform: translate(10vw, 25vh) scale(0.9); opacity: 0.8; }
            100% { transform: translate(-20vw, -10vh) scale(1.2); opacity: 0.6; }
        }
    </style>
</head>
<body class="antialiased">
    <div class="aurora-bg">
        <div class="aurora-blur aurora-1"></div>
        <div class="aurora-blur aurora-2"></div>
        <div class="aurora-blur aurora-3"></div>
    </div>
    
    <nav class="glass-panel sticky top-0 z-50 flex justify-between items-center p-4 m-4">
        <a href="/" class="text-xl font-bold text-primary flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-zap"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            QuizX
        </a>
        <div class="flex items-center gap-4">
            {% if session.user %}
                <span class="text-sm font-medium">Hello, {{ session.user.display_name }}</span>
                <a href="/auth/logout" class="px-4 py-2 text-sm font-medium text-white bg-primary rounded-md hover:bg-primary/90 transition-colors">Logout</a>
            {% else %}
                <a href="/auth/login" class="text-sm font-medium hover:text-primary">Login</a>
                <a href="/auth/register" class="px-4 py-2 text-sm font-medium text-white bg-primary rounded-md hover:bg-primary/90 transition-colors">Sign Up</a>
            {% endif %}
        </div>
    </nav>
    
    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
